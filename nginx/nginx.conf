load_module modules/ngx_http_geoip2_module.so;

user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    geoip2 /etc/nginx/geoip2/GeoLite2-Country.mmdb {
        $geoip_country_code default=XX source=$remote_addr country iso_code;
    }

    geo $rede_confiavel {
        default 0;
        127.0.0.1 1;
        10.0.0.0/8 1;
        172.16.0.0/12 1;
        192.168.0.0/16 1;
    }

    map "$rede_confiavel:$geoip_country_code:$remote_addr" $banido {
        "~^1:.*"             0; # Se é rede confiável, NÃO bane (0)
        "~^0:BR:.*"          0; # Se não é confiável, mas é BR normal, NÃO bane (0)
        default              1; # O resto (estrangeiro ou XX) BANE (1)
    }

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 50m;
    client_body_timeout 120s;
    client_header_timeout 30s;
    send_timeout 120s;

    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    include /etc/nginx/sites-enabled/*;
}
